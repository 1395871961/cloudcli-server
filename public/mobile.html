<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CloudCLI 远程连接</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
  --border: #2e3250; --primary: #6c8cff; --primary-d: #4a6ef5;
  --text: #e2e6f3; --text2: #8891b4; --green: #34d399;
  --red: #f87171; --yellow: #fbbf24; --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; }
#app { display: flex; flex-direction: column; min-height: 100vh; align-items: center;
  justify-content: center; padding: 16px; }
.screen { display: none; width: 100%; max-width: 420px; }
.screen.active { display: flex; flex-direction: column; gap: 16px; }
/* Full-screen iframe overlay */
#frame-overlay { position: fixed; inset: 0; z-index: 9999;
  background: var(--bg); display: none; flex-direction: column; }
#frame-overlay.active { display: flex; }
#frame-overlay iframe { flex: 1; border: none; }
.frame-bar { display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; background: rgba(26,29,39,0.95); border-bottom: 1px solid var(--border);
  flex-shrink: 0; }
.frame-bar-dot { display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; color: var(--green); }
.dot-live { width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.frame-bar button { background: transparent; border: 1px solid var(--border);
  color: var(--text2); font-size: 12px; padding: 4px 10px; border-radius: 6px; cursor: pointer; }
.frame-bar button:hover { color: var(--text); border-color: var(--text2); }
/* Card */
.card { background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; }
/* Logo */
.logo { text-align: center; margin-bottom: 8px; }
.logo svg { width: 40px; height: 40px; }
.logo h1 { font-size: 22px; font-weight: 700; margin-top: 8px; }
.logo p { font-size: 13px; color: var(--text2); margin-top: 4px; }
/* Form */
label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
input { width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 11px 14px; font-size: 15px; color: var(--text); outline: none;
  transition: border-color 0.2s; }
input:focus { border-color: var(--primary); }
input::placeholder { color: var(--text2); }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-row { display: flex; flex-direction: column; gap: 12px; }
/* Buttons */
.btn { display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 12px 16px; border-radius: 8px; font-size: 15px;
  font-weight: 600; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-d); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface2); }
/* Error */
.error-box { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
  border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--red); }
/* Device list */
.device-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: border-color 0.2s, background 0.2s; }
.device-item:hover { border-color: var(--primary); background: rgba(108,140,255,0.06); }
.device-item.offline { opacity: 0.45; cursor: not-allowed; }
.device-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--surface);
  border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 18px; }
.device-info { flex: 1; min-width: 0; }
.device-name { font-weight: 600; font-size: 15px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; }
.device-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; }
.dot.online { background: var(--green); box-shadow: 0 0 5px var(--green); }
.dot.offline { background: var(--text2); }
.online-label { font-size: 12px; font-weight: 500; }
.online-label.online { color: var(--green); }
.online-label.offline { color: var(--text2); }
.devices-list { display: flex; flex-direction: column; gap: 10px; }
/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 24px; height: 24px; border: 2.5px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
.loading-row { display: flex; align-items: center; gap: 12px; color: var(--text2); font-size: 14px; }
.topbar { display: flex; align-items: center; justify-content: space-between; }
.topbar h2 { font-size: 16px; font-weight: 700; }
.fade { animation: fadein 0.2s ease; }
@keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div id="app">

  <!-- Screen: Login -->
  <div class="screen active fade" id="screen-login">
    <div class="logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#6c8cff" fill-opacity="0.15"/>
        <rect x="8" y="12" width="24" height="3" rx="1.5" fill="#6c8cff"/>
        <rect x="8" y="19" width="18" height="3" rx="1.5" fill="#6c8cff" fill-opacity="0.7"/>
        <rect x="8" y="26" width="12" height="3" rx="1.5" fill="#6c8cff" fill-opacity="0.4"/>
      </svg>
      <h1>CloudCLI</h1>
      <p>远程连接到您的电脑</p>
    </div>
    <div class="card">
      <div class="form-row">
        <div class="form-group">
          <label>用户名</label>
          <input id="username" type="text" placeholder="输入用户名" autocomplete="username" autocapitalize="none">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input id="password" type="password" placeholder="输入密码" autocomplete="current-password">
        </div>
        <div id="login-error" class="error-box" style="display:none"></div>
        <button class="btn btn-primary" id="btn-login" onclick="doLogin()">登录</button>
      </div>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--text2)">使用与 Electron 桌面端相同的账号登录</p>
  </div>

  <!-- Screen: Device List -->
  <div class="screen fade" id="screen-devices">
    <div class="topbar">
      <h2>选择设备</h2>
      <button class="btn btn-ghost" style="width:auto;padding:6px 12px;font-size:13px" onclick="logout()">退出</button>
    </div>
    <div id="devices-list" class="devices-list">
      <div class="loading-row"><div class="spinner"></div>正在加载设备…</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="loadDevices()">↺ 刷新</button>
      <button class="btn btn-ghost" style="flex:1" onclick="toggleManual()">⌨ 手动输入</button>
    </div>
    <!-- Manual device ID input -->
    <div id="manual-connect" style="display:none" class="card">
      <div class="form-row">
        <div class="form-group">
          <label>设备 ID</label>
          <input id="manual-device-id" type="text" placeholder="粘贴设备 ID（在桌面端设置→设备中查看）" autocapitalize="none" autocorrect="off" spellcheck="false">
        </div>
        <div class="form-group">
          <label>设备名称（可选）</label>
          <input id="manual-device-name" type="text" placeholder="My PC">
        </div>
        <div id="manual-error" class="error-box" style="display:none"></div>
        <button class="btn btn-primary" onclick="connectManual()">直接连接</button>
      </div>
    </div>
  </div>

  <!-- Screen: Connecting -->
  <div class="screen fade" id="screen-connecting">
    <div class="card">
      <div class="loading-row" style="justify-content:center;flex-direction:column;gap:16px;padding:16px 0">
        <div class="spinner" style="width:36px;height:36px"></div>
        <div style="text-align:center">
          <div style="font-weight:600;font-size:16px">正在建立 P2P 连接</div>
          <div id="connecting-sub" style="color:var(--text2);font-size:13px;margin-top:4px">连接信令服务器…</div>
        </div>
      </div>
    </div>
    <button class="btn btn-ghost" onclick="cancelConnect()">取消</button>
  </div>

</div>

<!-- Full-screen overlay: React SPA in iframe, P2P running in background -->
<div id="frame-overlay">
  <div class="frame-bar">
    <div class="frame-bar-dot">
      <div class="dot-live"></div>
      <span id="frame-device-name">已连接</span>
      <span style="color:var(--text2);font-weight:400"> · P2P 直连</span>
    </div>
    <button onclick="disconnect()">断开</button>
  </div>
  <iframe id="spa-frame" src="" allow="clipboard-read; clipboard-write"></iframe>
</div>

<script>
'use strict';

// ─── Config ───────────────────────────────────────────────────────────────────
const API_BASE = 'https://mzycai.eu.cc';

// ─── State ────────────────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('mobile-token') || '';
let ws = null;
let pc = null;
let dc = null;
let pendingRequests = {};
let selectedDevice = null;
let swReady = false;
let bcChannel = null;  // BroadcastChannel with service worker
let pollTimer = null;

// ─── Helpers ─────────────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + id);
  el.classList.add('active');
  el.classList.remove('fade');
  void el.offsetHeight;
  el.classList.add('fade');
  // Auto-poll only on devices screen
  if (id === 'devices') {
    if (!pollTimer) pollTimer = setInterval(() => loadDevices(true), 10000);
  } else {
    clearInterval(pollTimer); pollTimer = null;
  }
}

function showError(elId, msg) {
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.style.display = msg ? '' : 'none';
}

function uuid() {
  return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
}

// ─── Auth ────────────────────────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  if (!username || !password) { showError('login-error', '请填写用户名和密码'); return; }
  btn.disabled = true; btn.textContent = '登录中…';
  showError('login-error', '');
  try {
    const res = await fetch(`${API_BASE}/api/auth.php?action=login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      const msg = res.status === 401
        ? '用户名或密码错误，请先在桌面端登录以初始化账号'
        : (data.error || '登录失败');
      showError('login-error', msg); return;
    }
    TOKEN = data.token;
    localStorage.setItem('mobile-token', TOKEN);
    show('devices');
    await loadDevices();
  } catch (e) {
    showError('login-error', '网络错误，请检查连接');
  } finally {
    btn.disabled = false; btn.textContent = '登录';
  }
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function logout() {
  TOKEN = ''; localStorage.removeItem('mobile-token');
  clearInterval(pollTimer); pollTimer = null;
  cleanup(); show('login');
}

// ─── Devices ─────────────────────────────────────────────────────────────────
async function loadDevices(silent = false) {
  const container = document.getElementById('devices-list');
  if (!silent) container.innerHTML = '<div class="loading-row"><div class="spinner"></div>加载设备中…</div>';
  try {
    const res = await fetch(`${API_BASE}/api/devices.php`, { headers: { Authorization: 'Bearer ' + TOKEN } });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    const devices = Array.isArray(data) ? data : (data.devices || []);
    if (!devices.length) {
      container.innerHTML = '<div style="text-align:center;color:var(--text2);padding:24px 0;font-size:14px">暂无在线设备<br><small>可使用下方「手动输入」直接连接</small></div>';
      document.getElementById('manual-connect').style.display = '';
      return;
    }
    container.innerHTML = '';
    for (const d of devices) {
      const online = d.online === true || d.is_online == 1;
      const el = document.createElement('div');
      el.className = 'device-item' + (online ? '' : ' offline');
      el.innerHTML = `
        <div class="device-icon">${d.platform === 'darwin' ? '💻' : '🖥️'}</div>
        <div class="device-info">
          <div class="device-name">${d.name || d.id}</div>
          <div class="device-meta">${d.platform || '桌面端'} · ${timeAgo(d.last_seen)}</div>
        </div>
        <div>
          <span class="dot ${online ? 'online' : 'offline'}"></span>
          <span class="online-label ${online ? 'online' : 'offline'}">${online ? '在线' : '离线'}</span>
        </div>`;
      if (online) el.onclick = () => connectDevice(d);
      container.appendChild(el);
    }
  } catch (e) {
    container.innerHTML = '<div style="text-align:center;color:var(--text2);padding:24px 0">加载失败：' + e.message + '</div>';
  }
}

function timeAgo(ts) {
  if (!ts) return '未知';
  const diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
  return Math.floor(diff / 86400) + ' 天前';
}

// ─── Manual connect ───────────────────────────────────────────────────────────
function toggleManual() {
  const el = document.getElementById('manual-connect');
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

async function connectManual() {
  const deviceId = document.getElementById('manual-device-id').value.trim();
  const deviceName = document.getElementById('manual-device-name').value.trim() || deviceId.slice(0, 8);
  showError('manual-error', '');
  if (!deviceId) { showError('manual-error', '请输入设备 ID'); return; }
  const fakeDevice = { id: deviceId, name: deviceName, platform: 'unknown', is_online: 1 };
  await connectDevice(fakeDevice);
}

// ─── WebRTC ───────────────────────────────────────────────────────────────────
const STUN = [{ urls: 'stun:stun.cloudflare.com:3478' }, { urls: 'stun:stun.l.google.com:19302' }];

async function connectDevice(device) {
  selectedDevice = device;
  show('connecting');
  setSub('连接信令服务器…');
  try { await doWebRTC(device); }
  catch (e) { alert('连接失败: ' + e.message); show('devices'); }
}

function setSub(msg) { document.getElementById('connecting-sub').textContent = msg; }

function cancelConnect() { cleanup(); show('devices'); }

function cleanup() {
  dc?.close(); dc = null;
  pc?.close(); pc = null;
  ws?.close(); ws = null;
  if (window._signalPollTimer) { clearInterval(window._signalPollTimer); window._signalPollTimer = null; }
  pendingRequests = {};
  // Notify SW to stop P2P proxying
  if (swReady) notifySW('p2p-disconnected');
  bcChannel?.close();
  bcChannel = null;
  // Hide overlay
  document.getElementById('frame-overlay').classList.remove('active');
}

function disconnect() { cleanup(); show('devices'); loadDevices(); }

async function doWebRTC(device) {
  const sessionId = uuid();
  const targetId = device.device_id || device.id;

  setSub('协商 WebRTC…');
  pc = new RTCPeerConnection({ iceServers: STUN });

  // Send ICE candidates to desktop via PHP signal
  pc.onicecandidate = async e => {
    if (!e.candidate || !pc) return;
    await fetch(`${API_BASE}/api/signal.php?action=send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
      body: JSON.stringify({ to: targetId, type: 'ice', sessionId, from: sessionId, data: e.candidate })
    }).catch(() => {});
  };

  dc = pc.createDataChannel('commands', { ordered: true });
  dc.onopen = () => onChannelOpen();
  dc.onmessage = e => onDcMessage(e.data);
  dc.onclose = () => { if (document.getElementById('frame-overlay').classList.contains('active')) disconnect(); };
  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed') { cleanup(); show('devices'); alert('P2P 连接失败，请重试'); }
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  // Send offer to desktop's inbox
  await fetch(`${API_BASE}/api/signal.php?action=send`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
    body: JSON.stringify({ to: targetId, type: 'offer', sessionId, from: sessionId, data: offer })
  });

  setSub('等待桌面端响应…');

  // Poll our own sessionId inbox for answer + ICE from desktop
  let answered = false;
  const deadline = Date.now() + 30000;
  await new Promise((resolve, reject) => {
    window._signalPollTimer = setInterval(async () => {
      if (!pc || Date.now() > deadline) {
        clearInterval(window._signalPollTimer); window._signalPollTimer = null;
        reject(new Error('等待桌面端响应超时'));
        return;
      }
      try {
        const r = await fetch(`${API_BASE}/api/signal.php?action=poll&deviceId=${sessionId}`, {
          headers: { Authorization: 'Bearer ' + TOKEN }
        });
        const { messages = [] } = await r.json();
        for (const msg of messages) {
          if (msg.type === 'answer' && !answered) {
            answered = true;
            await pc.setRemoteDescription(new RTCSessionDescription(msg.data));
            setSub('已收到应答，建立 P2P…');
          } else if (msg.type === 'ice' && msg.data) {
            try { await pc.addIceCandidate(new RTCIceCandidate(msg.data)); } catch {}
          } else if (msg.type === 'error') {
            clearInterval(window._signalPollTimer); window._signalPollTimer = null;
            reject(new Error(msg.data || '桌面端拒绝连接')); return;
          }
        }
        if (pc.connectionState === 'connected') {
          clearInterval(window._signalPollTimer); window._signalPollTimer = null;
          resolve();
        }
      } catch (e) { /* ignore poll errors */ }
    }, 500);
  });
}

function waitForMsg(ws, predicate, timeout) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error('等待响应超时')), timeout);
    const handler = raw => {
      let msg; try { msg = JSON.parse(typeof raw === 'string' ? raw : raw.data); } catch { return; }
      if (predicate(msg)) { clearTimeout(timer); ws.removeEventListener('message', handler); resolve(msg); }
    };
    ws.addEventListener('message', handler);
  });
}

// ─── Data Channel ─────────────────────────────────────────────────────────────
function dcSend(obj) {
  if (dc?.readyState === 'open') dc.send(JSON.stringify(obj));
}

async function onChannelOpen() {
  setSub('P2P 已建立，正在加载完整界面…');
  // Request local JWT from desktop
  dcSend({ type: 'request-local-token' });
}

function onDcMessage(raw) {
  let msg; try { msg = JSON.parse(raw); } catch { return; }

  if (msg.type === 'local-token' && msg.token) {
    // Store local JWT so React SPA can authenticate
    localStorage.setItem('auth-token', msg.token);
    // Set up BroadcastChannel bridge between SW and P2P data channel
    setupBroadcastBridge();
    // Register SW (or update) and then show the SPA
    registerSW().then(() => showSPA());
    return;
  }

  // P2P HTTP responses
  if (msg.type === 'http-response' && msg.requestId) {
    const p = pendingRequests[msg.requestId];
    if (p) { delete pendingRequests[msg.requestId]; p(msg); }
  }
}

// Bridge: BroadcastChannel ↔ P2P data channel
function setupBroadcastBridge() {
  bcChannel = new BroadcastChannel('cloudcli-p2p-proxy');
  bcChannel.addEventListener('message', async (ev) => {
    if (ev.data.type !== 'p2p-request') return;
    const { id, method, path, headers, body } = ev.data;
    const requestId = uuid();
    // Route through P2P data channel, forwarding original headers
    const result = await new Promise((resolve) => {
      pendingRequests[requestId] = resolve;
      dcSend({ type: 'http-request', requestId, port: 3001, method, path,
        headers: headers || {}, body: body || null });
      setTimeout(() => {
        if (pendingRequests[requestId]) { delete pendingRequests[requestId]; resolve({ status: 504, headers: {}, body: btoa('{"error":"timeout"}') }); }
      }, 18000);
    });
    bcChannel.postMessage({ type: 'p2p-response', id, status: result.status, headers: result.headers || {}, body: result.body });
  });
}

// Register / update service worker
async function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
    await navigator.serviceWorker.ready;
    swReady = true;
    // Tell SW that P2P is now active
    const sw = reg.active || reg.installing || reg.waiting;
    sw?.postMessage({ type: 'p2p-connected' });
    // Also broadcast via channel (in case SW is already active)
    notifySW('p2p-connected');
  } catch (e) {
    console.warn('[P2P] SW registration failed:', e);
  }
}

function notifySW(type) {
  if (!navigator.serviceWorker?.controller) return;
  navigator.serviceWorker.controller.postMessage({ type });
}

function showSPA() {
  document.getElementById('frame-device-name').textContent = selectedDevice?.name || '远程设备';
  const overlay = document.getElementById('frame-overlay');
  const frame = document.getElementById('spa-frame');
  // Load the React SPA — catch-all will serve dist/index.html
  frame.src = '/remote-desktop';
  overlay.classList.add('active');
}

// ─── P2P fetch (for non-SW use) ───────────────────────────────────────────────
function p2pFetch(method, path, body) {
  return new Promise((resolve, reject) => {
    if (!dc || dc.readyState !== 'open') { reject(new Error('P2P 未连接')); return; }
    const requestId = uuid();
    pendingRequests[requestId] = resolve;
    const bodyB64 = body ? btoa(unescape(encodeURIComponent(JSON.stringify(body)))) : null;
    dcSend({ type: 'http-request', requestId, port: 3001, method, path,
      headers: { 'Content-Type': 'application/json' }, body: bodyB64 });
    setTimeout(() => {
      if (pendingRequests[requestId]) { delete pendingRequests[requestId]; reject(new Error('请求超时')); }
    }, 15000);
  });
}

if (TOKEN) { show('devices'); loadDevices(); }
