<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CloudCLI 远程连接</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3250;
  --primary: #6c8cff;
  --primary-d: #4a6ef5;
  --text: #e2e6f3;
  --text2: #8891b4;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; }
#app { display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; padding: 16px; }
.screen { display: none; width: 100%; max-width: 420px; }
.screen.active { display: flex; flex-direction: column; gap: 16px; }

/* Card */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }

/* Header */
.logo { text-align: center; margin-bottom: 8px; }
.logo svg { width: 40px; height: 40px; }
.logo h1 { font-size: 22px; font-weight: 700; margin-top: 8px; color: var(--text); }
.logo p { font-size: 13px; color: var(--text2); margin-top: 4px; }

/* Form */
label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; font-size: 15px; color: var(--text); outline: none; transition: border-color 0.2s; }
input:focus { border-color: var(--primary); }
input::placeholder { color: var(--text2); }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-row { display: flex; flex-direction: column; gap: 12px; }

/* Buttons */
.btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px 16px; border-radius: 8px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-d); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface2); }
.btn-danger { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }

/* Error */
.error-box { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--red); }

/* Device list */
.device-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: border-color 0.2s, background 0.2s; }
.device-item:hover { border-color: var(--primary); background: rgba(108,140,255,0.06); }
.device-item.offline { opacity: 0.45; cursor: not-allowed; }
.device-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.device-info { flex: 1; min-width: 0; }
.device-name { font-weight: 600; font-size: 15px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.device-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
.dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.offline { background: var(--text2); }
.online-label { font-size: 12px; font-weight: 500; }
.online-label.online { color: var(--green); }
.online-label.offline { color: var(--text2); }
.devices-list { display: flex; flex-direction: column; gap: 10px; }
.section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }

/* Connected screen */
.connected-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.25); border-radius: var(--radius); }
.connected-header .dot { width: 9px; height: 9px; }
.connected-title { font-weight: 700; font-size: 16px; color: var(--green); }
.connected-sub { font-size: 12px; color: rgba(52,211,153,0.7); margin-top: 2px; }

/* Project list */
.proj-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: border-color 0.15s; }
.proj-item:hover { border-color: var(--primary); }
.proj-name { font-weight: 500; font-size: 14px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proj-list { display: flex; flex-direction: column; gap: 8px; }
.badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 20px; }
.badge-green { background: rgba(52,211,153,0.15); color: var(--green); }

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 24px; height: 24px; border: 2.5px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
.loading-row { display: flex; align-items: center; gap: 12px; color: var(--text2); font-size: 14px; }

/* Top bar for connected screen */
.topbar { display: flex; align-items: center; justify-content: space-between; }
.topbar h2 { font-size: 16px; font-weight: 700; }

/* Tabs */
.tabs { display: flex; background: var(--surface2); border-radius: 9px; padding: 3px; gap: 2px; }
.tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 500; color: var(--text2); border-radius: 7px; cursor: pointer; transition: background 0.15s, color 0.15s; border: none; background: transparent; }
.tab.active { background: var(--surface); color: var(--text); }

/* Tab content */
.tab-panel { display: none; }
.tab-panel.active { display: flex; flex-direction: column; gap: 10px; }

/* Empty state */
.empty { text-align: center; color: var(--text2); padding: 24px 0; font-size: 14px; }

/* Chat */
#chat-area { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; height: 320px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 13px; font-family: 'Menlo', 'Monaco', monospace; }
.chat-msg { border-radius: 6px; padding: 6px 10px; line-height: 1.5; max-width: 90%; white-space: pre-wrap; word-break: break-word; }
.chat-msg.user { background: rgba(108,140,255,0.15); color: var(--primary); align-self: flex-end; }
.chat-msg.assistant { background: var(--surface); color: var(--text); align-self: flex-start; }
.chat-msg.system { background: rgba(251,191,36,0.1); color: var(--yellow); align-self: center; font-size: 11px; }
.chat-input-row { display: flex; gap: 8px; }
#chat-input { flex: 1; resize: none; min-height: 44px; max-height: 120px; overflow-y: auto; }

/* Smooth transitions */
.fade { animation: fadein 0.2s ease; }
@keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div id="app">

  <!-- Screen: Login -->
  <div class="screen active fade" id="screen-login">
    <div class="logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#6c8cff" fill-opacity="0.15"/>
        <rect x="8" y="12" width="24" height="3" rx="1.5" fill="#6c8cff"/>
        <rect x="8" y="19" width="18" height="3" rx="1.5" fill="#6c8cff" fill-opacity="0.7"/>
        <rect x="8" y="26" width="12" height="3" rx="1.5" fill="#6c8cff" fill-opacity="0.4"/>
      </svg>
      <h1>CloudCLI</h1>
      <p>远程连接到您的电脑</p>
    </div>
    <div class="card">
      <div class="form-row">
        <div class="form-group">
          <label>用户名</label>
          <input id="username" type="text" placeholder="输入用户名" autocomplete="username" autocapitalize="none">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input id="password" type="password" placeholder="输入密码" autocomplete="current-password">
        </div>
        <div id="login-error" class="error-box" style="display:none"></div>
        <button class="btn btn-primary" id="btn-login" onclick="doLogin()">
          登录
        </button>
      </div>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--text2)">
      使用与 Electron 桌面端相同的账号登录
    </p>
  </div>

  <!-- Screen: Device List -->
  <div class="screen fade" id="screen-devices">
    <div class="topbar">
      <h2>选择设备</h2>
      <button class="btn btn-ghost" style="width:auto;padding:6px 12px;font-size:13px" onclick="logout()">退出</button>
    </div>
    <div id="devices-list" class="devices-list">
      <div class="loading-row"><div class="spinner"></div>正在加载设备…</div>
    </div>
    <button class="btn btn-ghost" onclick="loadDevices()">↺ 刷新</button>
  </div>

  <!-- Screen: Connecting -->
  <div class="screen fade" id="screen-connecting">
    <div class="card">
      <div class="loading-row" style="justify-content:center;flex-direction:column;gap:16px;padding:16px 0">
        <div class="spinner" style="width:36px;height:36px"></div>
        <div style="text-align:center">
          <div style="font-weight:600;font-size:16px">正在建立 P2P 连接</div>
          <div id="connecting-sub" style="color:var(--text2);font-size:13px;margin-top:4px">连接信令服务器…</div>
        </div>
      </div>
    </div>
    <button class="btn btn-ghost" onclick="cancelConnect()">取消</button>
  </div>

  <!-- Screen: Connected -->
  <div class="screen fade" id="screen-connected">
    <div class="connected-header">
      <span class="dot online"></span>
      <div style="flex:1">
        <div class="connected-title" id="connected-device-name">设备</div>
        <div class="connected-sub">P2P 直连 · 已加密</div>
      </div>
      <button class="btn btn-danger" style="width:auto;padding:6px 12px;font-size:13px" onclick="disconnect()">断开</button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('projects', this)">📁 项目</button>
      <button class="tab" onclick="switchTab('chat', this)">💬 对话</button>
    </div>

    <!-- Projects tab -->
    <div class="tab-panel active" id="tab-projects">
      <div class="proj-list" id="proj-list">
        <div class="loading-row"><div class="spinner"></div>加载项目…</div>
      </div>
    </div>

    <!-- Chat tab -->
    <div class="tab-panel" id="tab-chat">
      <div id="chat-area"></div>
      <div class="chat-input-row">
        <textarea id="chat-input" class="input" placeholder="输入消息（Enter 发送）" rows="1"
          onkeydown="handleChatKey(event)"></textarea>
        <button class="btn btn-primary" style="width:auto;padding:10px 16px" onclick="sendChat()">发送</button>
      </div>
      <div id="chat-error" class="error-box" style="display:none"></div>
    </div>
  </div>

</div>

<script>
'use strict';

// ─── State ────────────────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('mobile-token') || '';
let ws = null;
let pc = null;
let dc = null;
let pendingRequests = {};   // requestId → { resolve, reject }
let selectedDevice = null;
let localServerToken = null;  // received from desktop after P2P
let currentProjectId = null;
let currentSessionId = null;

// ─── Helpers ─────────────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + id);
  el.classList.add('active');
  el.classList.remove('fade');
  void el.offsetHeight;
  el.classList.add('fade');
}

function showError(elId, msg) {
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.style.display = msg ? '' : 'none';
}

function uuid() {
  return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
}

function b64dec(s) {
  try { return atob(s); } catch { return s; }
}

// ─── Auth ────────────────────────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  if (!username || !password) { showError('login-error', '请填写用户名和密码'); return; }

  btn.disabled = true;
  btn.textContent = '登录中…';
  showError('login-error', '');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) { showError('login-error', data.error || '登录失败'); return; }
    TOKEN = data.token;
    localStorage.setItem('mobile-token', TOKEN);
    show('devices');
    await loadDevices();
  } catch (e) {
    showError('login-error', '网络错误，请检查连接');
  } finally {
    btn.disabled = false;
    btn.textContent = '登录';
  }
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function logout() {
  TOKEN = '';
  localStorage.removeItem('mobile-token');
  cleanup();
  show('login');
}

// ─── Devices ─────────────────────────────────────────────────────────────────
async function loadDevices() {
  const container = document.getElementById('devices-list');
  container.innerHTML = '<div class="loading-row"><div class="spinner"></div>加载设备中…</div>';
  try {
    const res = await fetch('/api/devices', { headers: { Authorization: 'Bearer ' + TOKEN } });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    const devices = data.devices || [];
    if (!devices.length) {
      container.innerHTML = '<div class="empty">没有找到设备<br><small>请先在 Electron 桌面端登录并启用在线模式</small></div>';
      return;
    }
    container.innerHTML = '';
    for (const d of devices) {
      const online = d.is_online == 1;
      const el = document.createElement('div');
      el.className = 'device-item' + (online ? '' : ' offline');
      el.innerHTML = `
        <div class="device-icon">
          ${d.platform === 'win32' ? '🖥️' : d.platform === 'darwin' ? '💻' : '🖥️'}
        </div>
        <div class="device-info">
          <div class="device-name">${d.name || d.id}</div>
          <div class="device-meta">${d.platform || '未知平台'} · 最后活跃 ${timeAgo(d.last_seen)}</div>
        </div>
        <div>
          <span class="dot ${online ? 'online' : 'offline'}"></span>
          <span class="online-label ${online ? 'online' : 'offline'}">${online ? '在线' : '离线'}</span>
        </div>`;
      if (online) el.onclick = () => connectDevice(d);
      container.appendChild(el);
    }
  } catch (e) {
    container.innerHTML = '<div class="empty">加载失败：' + e.message + '</div>';
  }
}

function timeAgo(ts) {
  if (!ts) return '未知';
  const diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
  return Math.floor(diff / 86400) + ' 天前';
}

// ─── WebRTC Connection ────────────────────────────────────────────────────────
const STUN = [{ urls: 'stun:stun.cloudflare.com:3478' }, { urls: 'stun:stun.l.google.com:19302' }];

async function connectDevice(device) {
  selectedDevice = device;
  show('connecting');
  setSub('连接信令服务器…');
  try {
    await doWebRTC(device);
  } catch (e) {
    alert('连接失败: ' + e.message);
    show('devices');
  }
}

function setSub(msg) {
  document.getElementById('connecting-sub').textContent = msg;
}

function cancelConnect() {
  cleanup();
  show('devices');
}

function cleanup() {
  dc?.close(); dc = null;
  pc?.close(); pc = null;
  ws?.close(); ws = null;
  pendingRequests = {};
  localServerToken = null;
  currentProjectId = null;
  currentSessionId = null;
}

async function doWebRTC(device) {
  // Open signaling WebSocket
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${proto}//${location.host}/ws/signal?token=${TOKEN}`;
  ws = new WebSocket(wsUrl);

  await new Promise((resolve, reject) => {
    ws.onopen = resolve;
    ws.onerror = () => reject(new Error('WebSocket 连接失败'));
    setTimeout(() => reject(new Error('连接超时')), 10000);
  });

  setSub('已连接信令，发送配对请求…');

  // Tell server which device we want
  ws.send(JSON.stringify({ type: 'connect', device_id: device.id }));

  const sessionResult = await waitForMsg(ws, m => m.type === 'connected' || m.type === 'error', 8000);
  if (sessionResult.type === 'error') throw new Error(sessionResult.message);

  setSub('协商 WebRTC，建立 P2P…');

  // Create RTCPeerConnection
  pc = new RTCPeerConnection({ iceServers: STUN });

  // ICE candidates → signaling server
  pc.onicecandidate = e => {
    if (e.candidate && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'ice', payload: e.candidate }));
    }
  };

  // Route incoming signaling messages
  ws.onmessage = async raw => {
    let msg;
    try { msg = JSON.parse(raw.data); } catch { return; }
    if (msg.type === 'answer') {
      await pc.setRemoteDescription(new RTCSessionDescription(msg.payload));
    } else if (msg.type === 'ice' && msg.payload) {
      try { await pc.addIceCandidate(new RTCIceCandidate(msg.payload)); } catch {}
    }
  };

  // Create data channel (mobile side creates it)
  dc = pc.createDataChannel('commands', { ordered: true });

  dc.onopen = () => {
    setSub('P2P 已建立！');
    onConnected();
  };

  dc.onmessage = e => onDcMessage(e.data);

  dc.onclose = () => {
    if (document.getElementById('screen-connected').classList.contains('active')) {
      alert('设备连接已断开');
      disconnect();
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed') {
      cleanup();
      show('devices');
      alert('P2P 连接失败，请重试');
    }
  };

  // Create and send offer
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  ws.send(JSON.stringify({ type: 'offer', payload: offer }));

  // Wait for data channel to open (handled by dc.onopen)
}

function waitForMsg(ws, predicate, timeout) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error('等待响应超时')), timeout);
    const handler = raw => {
      let msg;
      try { msg = JSON.parse(typeof raw === 'string' ? raw : raw.data); } catch { return; }
      if (predicate(msg)) {
        clearTimeout(timer);
        ws.removeEventListener('message', handler);
        resolve(msg);
      }
    };
    ws.addEventListener('message', handler);
  });
}

function onConnected() {
  document.getElementById('connected-device-name').textContent = selectedDevice.name || selectedDevice.id;
  show('connected');
  // Request local server token from desktop
  dcSend({ type: 'request-local-token' });
  loadProjects();
}

function disconnect() {
  cleanup();
  show('devices');
  loadDevices();
}

// ─── Data Channel ─────────────────────────────────────────────────────────────
function dcSend(obj) {
  if (dc?.readyState === 'open') dc.send(JSON.stringify(obj));
}

function onDcMessage(raw) {
  let msg;
  try { msg = JSON.parse(raw); } catch { return; }

  // Local token from desktop
  if (msg.type === 'local-token') {
    localServerToken = msg.token;
    return;
  }

  // HTTP response
  if (msg.type === 'http-response' && msg.requestId) {
    const pending = pendingRequests[msg.requestId];
    if (pending) {
      delete pendingRequests[msg.requestId];
      pending.resolve(msg);
    }
    return;
  }

  // Claude stream chunk
  if (msg.type === 'stream-chunk') {
    appendChat('assistant', msg.text || '');
    return;
  }
  if (msg.type === 'stream-end') {
    appendChat('system', '── 完成 ──');
    return;
  }
}

// Promise-based HTTP fetch over P2P data channel
function p2pFetch(method, path, body, extraHeaders) {
  return new Promise((resolve, reject) => {
    if (!dc || dc.readyState !== 'open') { reject(new Error('P2P 未连接')); return; }
    const requestId = uuid();
    const headers = { 'Content-Type': 'application/json', ...(extraHeaders || {}) };
    if (localServerToken) headers['Authorization'] = 'Bearer ' + localServerToken;

    const bodyB64 = body ? btoa(unescape(encodeURIComponent(JSON.stringify(body)))) : null;

    pendingRequests[requestId] = { resolve, reject };
    dcSend({ type: 'http-request', requestId, port: 3001, method, path, headers, body: bodyB64 });

    setTimeout(() => {
      if (pendingRequests[requestId]) {
        delete pendingRequests[requestId];
        reject(new Error('请求超时'));
      }
    }, 15000);
  });
}

async function p2pJson(method, path, body) {
  const res = await p2pFetch(method, path, body);
  const text = decodeURIComponent(escape(b64dec(res.body || '')));
  try { return { status: res.status, data: JSON.parse(text) }; }
  catch { return { status: res.status, data: text }; }
}

// ─── Projects ─────────────────────────────────────────────────────────────────
async function loadProjects() {
  const list = document.getElementById('proj-list');
  list.innerHTML = '<div class="loading-row"><div class="spinner"></div>加载项目…</div>';
  try {
    const { status, data } = await p2pJson('GET', '/api/projects');
    const projects = Array.isArray(data) ? data : (data.projects || data.data || []);
    if (!projects.length) { list.innerHTML = '<div class="empty">暂无项目</div>'; return; }
    list.innerHTML = '';
    for (const p of projects) {
      const el = document.createElement('div');
      el.className = 'proj-item';
      el.innerHTML = `<span style="font-size:18px">📁</span><span class="proj-name">${p.name || p.display_name || p.path || p.id}</span>`;
      el.onclick = () => selectProject(p);
      list.appendChild(el);
    }
  } catch (e) {
    list.innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>';
  }
}

function selectProject(p) {
  currentProjectId = p.id;
  switchTab('chat', document.querySelector('.tab:nth-child(2)'));
  appendChat('system', `已选择项目：${p.name || p.display_name || p.id}`);
}

// ─── Chat / Claude ────────────────────────────────────────────────────────────
function appendChat(role, text) {
  const area = document.getElementById('chat-area');
  const el = document.createElement('div');
  el.className = 'chat-msg ' + role;
  el.textContent = text;
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  if (!currentProjectId) { appendChat('system', '⚠️ 请先在"项目"标签选择一个项目'); return; }
  input.value = '';
  showError('chat-error', '');
  appendChat('user', msg);

  try {
    // Create or reuse session
    if (!currentSessionId) {
      const res = await p2pJson('POST', `/api/projects/${currentProjectId}/sessions`, { title: '远程会话' });
      if (res.data?.id) currentSessionId = res.data.id;
      else if (res.data?.session?.id) currentSessionId = res.data.session.id;
    }

    if (!currentSessionId) { appendChat('system', '⚠️ 无法创建会话，请检查项目配置'); return; }

    // Send message via data channel — streaming handled by onmessage
    dcSend({ type: 'chat', sessionId: currentSessionId, projectId: currentProjectId, message: msg });

    // Also try direct HTTP
    const res = await p2pJson('POST', `/api/projects/${currentProjectId}/sessions/${currentSessionId}/messages`,
      { content: msg, role: 'user' });
    if (res.data?.content || res.data?.message) {
      appendChat('assistant', res.data.content || res.data.message);
    }
  } catch (e) {
    showError('chat-error', '发送失败: ' + e.message);
  }
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('tab-' + name)?.classList.add('active');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
if (TOKEN) {
  show('devices');
  loadDevices();
}
</script>
