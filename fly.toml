app = "cloudcli-server"
primary_region = "hkg"

[build]

[env]
  NODE_ENV = "production"
  SERVER_PORT = "3001"
  HOST = "0.0.0.0"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "cloudcli_data"
  destination = "/data"
